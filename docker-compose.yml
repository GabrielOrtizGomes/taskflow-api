services:
  mongodb:
    image: mongo:latest
    container_name: taskflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - taskflow_mongo_data:/data/db

  redis:
    image: redis:latest
    container_name: taskflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  taskflow_mongo_data: